<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

    display: flex;
    flex-direction: column;
  }
  header {

    display: flex;
    align-items: center;
    gap: 18px;
    background: #0f1216;
  }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  header .sub { font-size: 12px; color: #7a828e; }
  header .tools { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  #search {
    background: #15191f;
    border: 1px solid #232830;
    color: #e6e9ef;
    padding: 7px 12px;
    border-radius: 6px;
    font-size: 13px;
    width: 240px;
    outline: none;
  }
  #search:focus { border-color: #4a90e2; }
  .legend { display: flex; gap: 10px; font-size: 11px; }
  .legend span { display: flex; align-items: center; gap: 5px; color: #aab1bc; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .dot.page { background: #f59e0b; }
  .dot.widget { background: #a855f7; }
  .dot.component { background: #3b82f6; }
  .dot.sub { background: #10b981; }
  .dot.helper { background: #64748b; }

  main { display: flex; flex: 1; overflow: hidden; }
  #tree {
    flex: 1;
    overflow: auto;
    padding: 18px 22px;
    border-right: 1px solid #1f2329;
  }
  #panel {
    width: 380px;
    padding: 22px;
    overflow: auto;
    background: #0f1216;
  }

  .node {
    display: block;
    margin: 2px 0;
    user-select: none;
  }
  .node-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.12s;
  }
  .node-row:hover { background: #1a1e25; }
  .node-row.active { background: #1f3554; color: #fff; }
  .node-row.match { background: #3a2f0a; }
  .toggle {
    width: 14px;
    text-align: center;
    color: #6a7280;
    font-size: 10px;
    flex-shrink: 0;
  }
  .toggle.empty { visibility: hidden; }
  .label { flex: 1; }
  .label .nm { font-weight: 500; }
  .label .desc { color: #7a828e; font-size: 11px; margin-left: 6px; }
  .badge {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .badge.page { background: #f59e0b22; color: #f59e0b; }
  .badge.widget { background: #a855f722; color: #c084fc; }
  .badge.component { background: #3b82f622; color: #60a5fa; }
  .badge.sub { background: #10b98122; color: #34d399; }
  .badge.helper { background: #64748b22; color: #94a3b8; }
  .badge.root { background: #ef444422; color: #f87171; }
  .children {
    margin-left: 20px;
    border-left: 1px dashed #232830;
    padding-left: 8px;
  }
  .children.collapsed { display: none; }

  #panel h2 { font-size: 15px; margin-bottom: 4px; }
  #panel .ptype { font-size: 11px; color: #7a828e; margin-bottom: 14px; }
  #panel .ppath {
    font-family: ui-monospace, SFMono-Regular, monospace;
    font-size: 11px;
    background: #15191f;
    padding: 6px 8px;
    border-radius: 4px;
    color: #aab1bc;
    margin-bottom: 14px;
    word-break: break-all;
  }
  #panel .pdesc { font-size: 13px; line-height: 1.55; color: #cdd3dc; margin-bottom: 16px; }
  #panel .psection { font-size: 11px; text-transform: uppercase; color: #7a828e; letter-spacing: 0.06em; margin-bottom: 6px; }
  #panel .plist li {
    list-style: none;
    font-size: 12px;
    padding: 3px 0;
    color: #aab1bc;
  }
  #panel .plist li::before { content: "→ "; color: #4a90e2; }
  #panel .pempty { font-size: 12px; color: #6a7280; font-style: italic; }

  .controls { display: flex; gap: 6px; }
  .btn {
    background: #15191f;
    border: 1px solid #232830;
    color: #cdd3dc;
    padding: 6px 10px;
    font-size: 11px;
    border-radius: 5px;
    cursor: pointer;
  }
  .btn:hover { background: #1f242c; }

  footer {
    padding: 8px 22px;
    border-top: 1px solid #1f2329;
    font-size: 11px;
    color: #6a7280;
    background: #0f1216;
  }

    </div>

    <div class="controls">

      <button class="btn" id="collapseAll">Collapse top</button>
    </div>
  </div>
</header>
<main>
  <div id="tree"></div>
  <aside id="panel">
    <div class="pempty">Click any component to see details.</div>
  </aside>
</main>
<footer>120 source files indexed · Next.js 14 Pages Router · branch: staging</footer>

  ]
};

// ============================================================
// Render
// ============================================================
const treeEl = document.getElementById("tree");
const panel = document.getElementById("panel");
const search = document.getElementById("search");

let activeRow = null;

function render(node, parentEl, depth = 0) {
  const wrap = document.createElement("div");
  wrap.className = "node";
  wrap.dataset.name = node.name.toLowerCase();
  wrap.dataset.desc = (node.desc || "").toLowerCase();

  const row = document.createElement("div");
  row.className = "node-row";
  row.dataset.id = node.id;

  const toggle = document.createElement("span");
  toggle.className = "toggle" + (node.children && node.children.length ? "" : " empty");
  toggle.textContent = node.children && node.children.length ? "▶" : "•";
  row.appendChild(toggle);

  const badge = document.createElement("span");
  badge.className = "badge " + node.type;
  badge.textContent = node.type;
  row.appendChild(badge);

  const label = document.createElement("span");
  label.className = "label";
  label.innerHTML = `<span class="nm">${escapeHtml(node.name)}</span><span class="desc">${escapeHtml(truncate(node.desc, 80))}</span>`;
  row.appendChild(label);

  wrap.appendChild(row);

  let childrenWrap = null;
  if (node.children && node.children.length) {
    childrenWrap = document.createElement("div");
    childrenWrap.className = "children" + (depth >= 1 ? " collapsed" : "");
    node.children.forEach(c => render(c, childrenWrap, depth + 1));
    wrap.appendChild(childrenWrap);
    toggle.textContent = childrenWrap.classList.contains("collapsed") ? "▶" : "▼";
  }

  row.addEventListener("click", (e) => {
    e.stopPropagation();
    if (childrenWrap) {
      childrenWrap.classList.toggle("collapsed");
      toggle.textContent = childrenWrap.classList.contains("collapsed") ? "▶" : "▼";
    }
    showDetails(node);
    if (activeRow) activeRow.classList.remove("active");
    row.classList.add("active");
    activeRow = row;
  });

  parentEl.appendChild(wrap);
}

function showDetails(node) {
  const childList = (node.children || []).map(c =>
    `<li><strong>${escapeHtml(c.name)}</strong> — ${escapeHtml(c.desc || "")}</li>`
  ).join("");
  panel.innerHTML = `
    <h2>${escapeHtml(node.name)}</h2>
    <div class="ptype">${node.type.toUpperCase()}</div>
    <div class="ppath">${escapeHtml(node.path || "")}</div>
    <div class="pdesc">${escapeHtml(node.desc || "")}</div>
    ${childList ? `<div class="psection">Children (${(node.children || []).length})</div><ul class="plist">${childList}</ul>` : `<div class="pempty">Leaf node — no children.</div>`}
  `;
}

function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}
function truncate(s, n) { s = s || ""; return s.length > n ? s.slice(0, n - 1) + "…" : s; }

render(TREE, treeEl);

// ============================================================
// Search
// ============================================================
search.addEventListener("input", (e) => {
  const q = e.target.value.trim().toLowerCase();
  document.querySelectorAll(".node").forEach(n => {
    const hit = !q || n.dataset.name.includes(q) || n.dataset.desc.includes(q);
    n.style.display = "";
    n.querySelector(".node-row").classList.toggle("match", q && hit);
    if (q && hit) {
      let p = n.parentElement;
      while (p && p.id !== "tree") {
        if (p.classList.contains("children")) p.classList.remove("collapsed");
        p = p.parentElement;
      }
    }
  });
  if (q) {
    document.querySelectorAll(".node").forEach(n => {
      if (!n.dataset.name.includes(q) && !n.dataset.desc.includes(q)) {
        const hasMatchInside = n.querySelector(".node-row.match");
        if (!hasMatchInside) n.style.display = "none";
      }
    });
  }
});

document.getElementById("expandAll").addEventListener("click", () => {
  document.querySelectorAll(".children").forEach(c => c.classList.remove("collapsed"));
  document.querySelectorAll(".toggle").forEach(t => { if (!t.classList.contains("empty")) t.textContent = "▼"; });
});
document.getElementById("collapseAll").addEventListener("click", () => {
  document.querySelectorAll("#tree > .node > .children").forEach(c => c.classList.add("collapsed"));
  document.querySelectorAll("#tree > .node > .node-row .toggle").forEach(t => { if (!t.classList.contains("empty")) t.textContent = "▶"; });
});

showDetails(TREE);
</script>
</body>
</html>
